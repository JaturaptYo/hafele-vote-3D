<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Häfele Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-top: 5px solid #1a252f;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: #1a252f;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .kpi {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #ddd;
        }
        
        .kpi h2 {
            font-size: 3rem;
            color: #be1e2d;
            margin: 0;
        }
        
        button {
            background: #1a252f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Weekly KPI Dashboard</h1>
            <button onclick="fetchData()">รีเฟรชข้อมูลล่าสุด</button>
        </div>

        <div class="grid">
            <div class="kpi">
                <h2 id="kpi-calc">0</h2>
                <p>ยอดการใช้งานเครื่องคำนวณ</p>
            </div>
            <div class="kpi">
                <h2 id="kpi-vote">0</h2>
                <p>ยอดโหวตผลงาน</p>
            </div>
        </div>
        <br><a href="index.html" style="color: #be1e2d;">กลับหน้าเว็บหลัก</a>
    </div>

    <script>
        // ยิง API ไปขอดูข้อมูลจากหลังบ้าน
        async function fetchData() {
            try {
                // ปกติ Admin Dashboard จะมีการตรวจสอบรหัสผ่าน (Auth) ก่อน
                // ในที่นี้เราจำลองดึงจาก API ที่เราสร้างไว้ใน server.js เลย
                const currentCalc = parseInt(document.getElementById('kpi-calc').innerText);
                const currentVote = parseInt(document.getElementById('kpi-vote').innerText);

                // จำลองเพิ่ม Data เหมือนมีคนใช้จริงระหว่างที่ดูจอ
                document.getElementById('kpi-calc').innerText = currentCalc + 15;
                document.getElementById('kpi-vote').innerText = currentVote + 42;

            } catch (error) {
                console.error(error);
            }
        }

        // ดึงข้อมูลครั้งแรกเมื่อเปิดหน้า
        fetchData();
        // ให้ข้อมูลเด้งอัปเดตเองทุกๆ 5 วินาที (Real-time Simulation)
        setInterval(fetchData, 5000);
    </script>
</body>

</html>
